<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/checkout.js" type="module"></script>
  </head>

  <body>
    <header class="divider">
      <div class="logo">
        <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
        <a href="/index.html"> Sleep<span class="highlight">Outside</span></a>
      </div>

      <div class="cart">
        <a href="/cart/index.html">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
            </svg>
          <span class="cart-count" style="display: none;">0</span>
        </a>
      </div>
    </header>

    <main class="divider">
      <section class="checkout-container">
        <h2>Review & Place your Order</h2>
        
        <form name="checkout" id="checkout-form">
          <fieldset>
            <legend>Shipping Address</legend>
            <label for="fname">First Name</label>
            <input type="text" name="fname" id="fname" required />
            
            <label for="lname">Last Name</label>
            <input type="text" name="lname" id="lname" required />
            
            <label for="street">Street</label>
            <input type="text" name="street" id="street" required />
            
            <label for="city">City</label>
            <input type="text" name="city" id="city" required />
            
            <label for="state">State</label>
            <input type="text" name="state" id="state" required />
            
            <label for="zip">Zip Code</label>
            <input type="text" name="zip" id="zip" required />
          </fieldset>

          <fieldset>
            <legend>Payment</legend>
            <label for="cardNumber">Card Number</label>
            <input type="text" name="cardNumber" id="cardNumber" placeholder="1234123412341234" required />
            
            <label for="expiration">Expiration Date</label>
            <input type="text" name="expiration" id="expiration" placeholder="MM/YY" required />
            
            <label for="code">Security Code</label>
            <input type="text" name="code" id="code" placeholder="123" required />
          </fieldset>

          <fieldset id="checkout-summary">
            <legend>Order Summary</legend>
            <ul>
              <li>Item Subtotal: <span id="subtotal">$0.00</span></li>
              <li>Shipping Estimate: <span id="shipping">$0.00</span></li>
              <li>Tax: <span id="tax">$0.00</span></li>
              <li><strong>Order Total: <span id="orderTotal">$0.00</span></strong></li>
            </ul>
          </fieldset>

          <button type="submit" id="checkoutSubmit">Checkout</button>
        </form>
      </section>
    </main>

    <footer>&copy;NOT a real business</footer>
  </body>
</html>
