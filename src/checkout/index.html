<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script type="module" src="../js/checkout.js"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="checkout">
        <h2>Review &amp; Place your Order</h2>

        <form id="checkout-form">
          <fieldset>
            <legend>Contact Information</legend>
            <label>
              First Name
              <input type="text" name="fname" required />
            </label>
            <label>
              Last Name
              <input type="text" name="lname" required />
            </label>
            <label>
              Email
              <input type="email" name="email" required />
            </label>
          </fieldset>

          <fieldset>
            <legend>Shipping Address</legend>
            <label>
              Street Address
              <input type="text" name="street" required />
            </label>
            <label>
              City
              <input type="text" name="city" required />
            </label>
            <label>
              State
              <input
                type="text"
                name="state"
                minlength="2"
                maxlength="2"
                required
              />
            </label>
            <label>
              Zip Code
              <input type="text" name="zip" pattern="[0-9]{5}" required />
            </label>
          </fieldset>

          <fieldset>
            <legend>Payment</legend>
            <label>
              Card Number
              <input
                type="text"
                name="cardNumber"
                pattern="[0-9]{16}"
                required
              />
            </label>
            <label>
              Expiration Date
              <input
                type="text"
                name="expiration"
                placeholder="MM/YY"
                pattern="(0[1-9]|1[0-2])\/[0-9]{2}"
                required
              />
            </label>
            <label>
              Security Code
              <input type="text" name="code" pattern="[0-9]{3,4}" required />
            </label>
          </fieldset>

          <button id="checkoutSubmit" type="button">Place Order</button>
        </form>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
